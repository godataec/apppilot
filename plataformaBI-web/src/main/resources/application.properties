# Scheduler Global Configuration
# Master switch to enable/disable ALL scheduled tasks (overrides individual settings)
scheduler.global.enabled=false
scheduler.process.expiration.warning.enabled=false
scheduler.process.expired.notification.enabled=false
scheduler.process.policy.expiration.warning.enabled=false
scheduler.process.policy.overdue.notification.enabled=false

# Scheduler Configuration - Cron Expressions
# Process expiration warning scheduler (default: daily at 8:00 AM)
# Format: seconds minutes hours day-of-month month day-of-week
scheduler.process.expiration.warning.cron=0 0 8 * * ?

# Expired process notification scheduler (default: daily at 9:00 AM)
scheduler.process.expired.notification.cron=0 0 9 * * ?

# ProcessPolicy expiration warning scheduler (default: daily at 10:00 AM)
scheduler.process.policy.expiration.warning.cron=0 0 10 * * ?

# ProcessPolicy overdue notification scheduler (default: daily at 11:00 AM)
scheduler.process.policy.overdue.notification.cron=0 0 11 * * ?

# Alternative examples for different schedules:
# Every 30 minutes: 0 */30 * * * ?
# Every hour at minute 15: 0 15 * * * ?
# Monday to Friday at 8 AM: 0 0 8 * * MON-FRI
# Every 6 hours: 0 0 */6 * * ?

